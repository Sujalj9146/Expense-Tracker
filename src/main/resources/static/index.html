<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        /* Card */
        .container {
            width: 480px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        /* Heading */
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        /* Inputs */
        label {
            font-weight: 600;
            margin-top: 10px;
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* Buttons */
        button {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .secondary {
            background: #6b7280;
        }

        .secondary:hover {
            background: #4b5563;
        }

        /* Total */
        .total {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }

        /* Table */
        table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #f1f5f9;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Expense Tracker</h2>

    <label>Title</label>
    <input type="text" id="title" placeholder="e.g. Lunch">

    <label>Amount</label>
    <input type="number" id="amount" placeholder="e.g. 200">

    <label>Category</label>
    <input type="text" id="category" placeholder="Food / Travel / Bills">

    <button onclick="addExpense()">Add Expense</button>
    <button class="secondary" onclick="loadExpenses()">View Expenses</button>

    <div id="total" class="total">Total: ₹0</div>

    <div id="list"></div>

</div>

<script>

    function addExpense() {

        fetch(window.location.origin + "/expenses", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                title: document.getElementById("title").value,
                amount: parseFloat(document.getElementById("amount").value),
                category: document.getElementById("category").value
            })
        })
        .then(() => {
            alert("Expense added");
            loadExpenses(); // auto refresh
        })
        .catch(() => alert("Error adding expense"));
    }

    function loadExpenses() {

        fetch(window.location.origin + "/expenses")
        .then(res => res.json())
        .then(data => {

            if (data.length === 0) {
                document.getElementById("list").innerHTML = "<p>No expenses yet</p>";
                return;
            }

            let table = `
                <table>
                    <tr>
                        <th>Title</th>
                        <th>Amount</th>
                        <th>Category</th>
                    </tr>
            `;

            data.forEach(e => {
                table += `
                    <tr>
                        <td>${e.title}</td>
                        <td>₹${e.amount}</td>
                        <td>${e.category}</td>
                    </tr>
                `;
            });

            table += "</table>";
            document.getElementById("list").innerHTML = table;
        });

        // total
        fetch(window.location.origin + "/expenses/total")
        .then(res => res.json())
        .then(data => {
            document.getElementById("total").innerText = "Total: ₹" + data.total;
        });
    }

</script>

</body>
</html>
